<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus+Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07);
            --accent: #ff4d6d;
            --accent2: #7c3aed;
            --accent3: #06b6d4;
            --gold: #f59e0b;
            --text: #f1f1f1;
            --muted: #6b7280;
            --green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            animation: pageFadeIn 0.8s ease-out;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80vw 60vh at 10% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60vw 50vh at 90% 80%, rgba(255,77,109,0.1) 0%, transparent 55%),
                radial-gradient(ellipse 50vw 40vh at 50% 50%, rgba(6,182,212,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px 32px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            border-color: rgba(6,182,212,0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo .campus {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .plus {
            color: var(--accent3);
        }

        .logo .connect {
            background: linear-gradient(135deg, var(--accent3), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--muted);
            font-size: 16px;
            width: 20px;
            text-align: center;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 16px 16px 48px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:focus {
            border-color: var(--accent3);
            box-shadow: 0 0 0 4px rgba(6,182,212,0.1);
            transform: translateY(-2px);
        }

        input:focus + .input-icon {
            color: var(--accent3);
        }

        input::placeholder {
            color: var(--muted);
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent3), var(--green));
            color: #0a0a0f;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(6,182,212,0.4);
        }

        .login-btn i {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .login-btn:hover i {
            transform: translateX(5px);
        }

        .test-credentials {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .test-credentials p {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .credential-badges {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cred-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .cred-badge::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(6,182,212,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .cred-badge:active::before {
            width: 200px;
            height: 200px;
        }

        .cred-badge:hover {
            border-color: var(--accent3);
            transform: translateY(-3px) scale(1.02);
            background: var(--surface);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .cred-badge.student i {
            color: var(--accent3);
        }

        .cred-badge.admin i {
            color: var(--gold);
        }

        .signup-link {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .signup-link a {
            color: var(--accent3);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .signup-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent3);
            transition: width 0.3s ease;
        }

        .signup-link a:hover::after {
            width: 100%;
        }

        .signup-link a:hover {
            color: var(--accent);
        }

        .error-message {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 16px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>
                    <span class="campus">Campus Connect</span>
                </h1>
                <span class="badge">Live · 2026</span>
            </div>

            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to access your campus events</p>

            <div class="input-group">
                <label class="input-label">Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="student@campus.edu" value="student@campus.edu">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="••••••••" value="password123">
                </div>
            </div>

            <button class="login-btn" onclick="login()">
                <i class="fas fa-arrow-right-to-bracket"></i>
                Sign In
            </button>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid email or password</span>
            </div>

            <div class="signup-link">
                Don't have an account?
                <a href="signup.html">Create one</a>
            </div>
        </div>
    </div>

    <script>
    // API Base URL
    const API_BASE = 'https://w9r4g7e58a.execute-api.ap-south-1.amazonaws.com/prod';

    function fillCredentials(email, password) {
        const emailField = document.getElementById('email');
        const passwordField = document.getElementById('password');
        
        emailField.value = email;
        passwordField.value = password;
        
        // Add visual feedback
        emailField.style.borderColor = 'var(--accent3)';
        passwordField.style.borderColor = 'var(--accent3)';
        setTimeout(() => {
            emailField.style.borderColor = '';
            passwordField.style.borderColor = '';
        }, 500);
        
        // Auto login after filling
        setTimeout(() => login(), 300);
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = message;
        errorDiv.classList.add('show');
        setTimeout(() => errorDiv.classList.remove('show'), 3000);
    }

    function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
            showError('Please fill in all fields');
            return;
        }

        // Show loading state
        const btn = document.querySelector('.login-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        btn.disabled = true;

        fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.user) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } else {
                showError('Invalid email or password');
            }
        })
        .catch(err => {
            console.error('Login error:', err);
            showError('Connection error. Try again.');
        })
        .finally(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    }

    // Add Enter key support
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            login();
        }
    });
    </script>
</body>
</html>
