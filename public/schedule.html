<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Campus+Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07);
            --accent: #ff4d6d;
            --accent2: #7c3aed;
            --accent3: #06b6d4;
            --gold: #f59e0b;
            --text: #f0f0f8;
            --muted: #6b7280;
            --green: #10b981;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            animation: pageFadeIn 0.8s ease-out;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80vw 60vh at 10% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60vw 50vh at 90% 80%, rgba(255,77,109,0.1) 0%, transparent 55%),
                radial-gradient(ellipse 50vw 40vh at 50% 50%, rgba(6,182,212,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Navbar Styles - Matching index.html */
        #navbar-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(10,10,15,0.85);
            border-bottom: 1px solid var(--border);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .nav-logo .plus {
            color: var(--accent);
        }

        .nav-logo .badge {
            font-size: 11px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            padding: 2px 8px;
            border-radius: 20px;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a, #logoutBtn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            background: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }

        .nav-links a:hover, #logoutBtn:hover {
            color: var(--text);
            background: rgba(255,255,255,0.06);
        }

        .main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 32px 80px;
        }

        .header {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            animation: fadeInLeft 0.8s ease;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent3), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header i {
            font-size: 48px;
            color: var(--accent3);
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header p {
            color: var(--muted);
            font-size: 18px;
            margin-top: 8px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s ease both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .stat-card i {
            font-size: 32px;
            color: var(--accent3);
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }

        .stat-card:hover i {
            transform: scale(1.1);
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, var(--text), var(--muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .label {
            color: var(--muted);
            font-size: 14px;
        }

        /* Calendar Header */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--surface);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .month-nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .month-nav button {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .month-nav button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(6,182,212,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .month-nav button:active::before {
            width: 100px;
            height: 100px;
        }

        .month-nav button:hover {
            background: var(--accent3);
            color: #0a0a0f;
            transform: translateY(-3px) scale(1.05);
        }

        .current-month {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            min-width: 200px;
            text-align: center;
            background: linear-gradient(135deg, var(--text), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .view-options {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .view-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(6,182,212,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .view-btn:active::before {
            width: 150px;
            height: 150px;
        }

        .view-btn:hover {
            border-color: var(--accent3);
            color: var(--text);
            transform: translateY(-2px);
        }

        .view-btn.active {
            background: linear-gradient(135deg, var(--accent3), var(--green));
            color: #0a0a0f;
            border: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(6,182,212,0.4); }
            50% { box-shadow: 0 0 0 5px rgba(6,182,212,0.2); }
        }

        /* Week Days */
        .week-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .week-day {
            text-align: center;
            font-weight: 600;
            color: var(--muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px;
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 50px;
        }

        .calendar-day {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            min-height: 120px;
            padding: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .calendar-day:hover {
            border-color: var(--accent3);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .calendar-day.other-month {
            opacity: 0.3;
        }

        .calendar-day.today {
            border: 2px solid var(--accent3);
            box-shadow: 0 0 20px rgba(6,182,212,0.3);
            animation: glow 2s ease infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(6,182,212,0.3); }
            50% { box-shadow: 0 0 20px rgba(6,182,212,0.6); }
        }

        .day-number {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .calendar-day:hover .day-number {
            transform: scale(1.1);
            color: var(--accent3);
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .mini-event {
            background: rgba(6,182,212,0.15);
            border-left: 3px solid var(--accent3);
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text);
        }

        .mini-event:hover {
            background: rgba(6,182,212,0.3);
            transform: translateX(5px);
            border-left-width: 4px;
        }

        /* List View */
        .schedule-list {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .schedule-list.active {
            display: flex;
        }

        .schedule-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeSlideUp 0.5s ease both;
        }

        .schedule-item:hover {
            transform: translateX(8px) scale(1.01);
            border-color: var(--accent3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .schedule-date {
            background: var(--surface2);
            padding: 16px;
            border-radius: 16px;
            min-width: 100px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .schedule-item:hover .schedule-date {
            background: rgba(6,182,212,0.1);
            border-color: var(--accent3);
        }

        .schedule-date .month {
            font-size: 14px;
            color: var(--accent3);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .schedule-date .day {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
        }

        .schedule-date .year {
            font-size: 12px;
            color: var(--muted);
        }

        .schedule-info {
            flex: 1;
        }

        .schedule-info h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            font-family: 'Syne', sans-serif;
            transition: color 0.3s ease;
        }

        .schedule-item:hover .schedule-info h3 {
            color: var(--accent3);
        }

        .schedule-info .meta {
            display: flex;
            gap: 24px;
            color: var(--muted);
            font-size: 14px;
            flex-wrap: wrap;
        }

        .schedule-info .meta i {
            margin-right: 6px;
            color: var(--accent3);
            width: 16px;
            transition: transform 0.3s ease;
        }

        .schedule-item:hover .schedule-info .meta i {
            transform: scale(1.1);
        }

        .schedule-info .description {
            color: var(--muted);
            font-size: 13px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
        }

        .schedule-register {
            background: linear-gradient(135deg, var(--accent3), var(--green));
            color: #0a0a0f;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .schedule-register::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .schedule-register:active::before {
            width: 200px;
            height: 200px;
        }

        .schedule-register:hover:not(:disabled) {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 25px rgba(6,182,212,0.4);
        }

        .schedule-register.registered {
            background: var(--surface2);
            color: var(--green);
            border: 1px solid var(--green);
            cursor: default;
        }

        .schedule-register.registered:hover {
            transform: none;
            box-shadow: none;
        }

        .schedule-register:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--muted);
            grid-column: 1 / -1;
        }

        .loading i {
            font-size: 40px;
            margin-bottom: 15px;
            color: var(--accent3);
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .no-events {
            text-align: center;
            padding: 60px;
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            grid-column: 1 / -1;
        }

        .no-events i {
            font-size: 48px;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .no-events h3 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .no-events p {
            color: var(--muted);
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: translateX(400px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            max-width: 360px;
            min-width: 300px;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }
        .toast.success .toast-icon {
            color: var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--error);
        }
        .toast.error .toast-icon {
            color: var(--error);
        }

        .toast.info {
            border-left: 4px solid var(--accent3);
        }
        .toast.info .toast-icon {
            color: var(--accent3);
        }

        .toast.warning {
            border-left: 4px solid var(--warning);
        }
        .toast.warning .toast-icon {
            color: var(--warning);
        }

        .toast-icon {
            font-size: 24px;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .toast-message {
            font-size: 13px;
            color: var(--muted);
        }

        .toast-close {
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s;
        }
        .toast-close:hover {
            color: var(--text);
            transform: rotate(90deg);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            max-width: 520px;
            width: 90%;
            max-height: 85vh;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 24px 28px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent3), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-header i {
            font-size: 22px;
            color: var(--accent3);
        }

        .modal-close {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--accent);
            color: white;
            transform: rotate(90deg);
            border-color: var(--accent);
        }

        .modal-content {
            padding: 24px 28px;
            max-height: 65vh;
            overflow-y: auto;
        }

        .modal-content::-webkit-scrollbar {
            width: 6px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: var(--surface2);
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: var(--accent3);
            border-radius: 10px;
        }

        .modal-event-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .modal-event-item:hover {
            transform: translateX(5px);
            border-color: var(--accent3);
            background: rgba(6,182,212,0.05);
        }

        .modal-event-title {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent3);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-event-title i {
            font-size: 18px;
        }

        .modal-event-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .modal-event-detail {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--muted);
        }

        .modal-event-detail i {
            width: 20px;
            color: var(--accent3);
        }

        .modal-event-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
            margin-bottom: 16px;
        }

        .modal-event-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn-register {
            background: linear-gradient(135deg, var(--accent3), var(--green));
            color: #0a0a0f;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-btn-register:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6,182,212,0.3);
        }

        .modal-btn-register.registered {
            background: var(--surface2);
            color: var(--green);
            border: 1px solid var(--green);
            cursor: default;
        }

        .modal-btn-register.registered:hover {
            transform: none;
            box-shadow: none;
        }

        .modal-empty {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        .modal-empty i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--muted);
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main { padding: 20px; }
            .header h1 { font-size: 32px; }
            .calendar-header { flex-direction: column; gap: 15px; }
            .current-month { min-width: auto; }
            .schedule-item { flex-direction: column; text-align: center; }
            .schedule-info .meta { justify-content: center; }
            .stats-grid { grid-template-columns: 1fr; }
            .modal { width: 95%; }
            .modal-header h3 { font-size: 18px; }
            .modal-header { padding: 18px 20px; }
            .modal-content { padding: 18px 20px; }
        }
    </style>
</head>
<body>
    <div id="navbar-wrapper">
        <div id="navbar"></div>
    </div>

    <main class="main">
        <div class="header">
            <i class="fas fa-calendar-alt"></i>
            <div>
                <h1>Event Schedule</h1>
                <p>Browse all events by date — plan your campus journey</p>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <i class="fas fa-calendar"></i>
                <div class="number" id="totalEvents">0</div>
                <div class="label">Total Events</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div class="number" id="upcomingEvents">0</div>
                <div class="label">Upcoming</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-calendar-week"></i>
                <div class="number" id="thisMonth">0</div>
                <div class="label">This Month</div>
            </div>
        </div>

        <div class="calendar-header">
            <div class="month-nav">
                <button onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                <span class="current-month" id="currentMonth">March 2026</span>
                <button onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="view-options">
                <button class="view-btn active" onclick="switchView('calendar')" id="btnCalendar">
                    <i class="fas fa-calendar"></i> Calendar
                </button>
                <button class="view-btn" onclick="switchView('list')" id="btnList">
                    <i class="fas fa-list"></i> List
                </button>
            </div>
        </div>

        <div id="calendarView">
            <div class="week-days">
                <div class="week-day">Sun</div>
                <div class="week-day">Mon</div>
                <div class="week-day">Tue</div>
                <div class="week-day">Wed</div>
                <div class="week-day">Thu</div>
                <div class="week-day">Fri</div>
                <div class="week-day">Sat</div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Loading calendar...</p>
                </div>
            </div>
        </div>

        <div id="listView" class="schedule-list"></div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal -->
    <div id="eventModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-calendar-day"></i>
                    <h3 id="modalDate">Events on Date</h3>
                </div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-content" id="modalContent">
                <div class="modal-empty">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading events...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
    // API Base URL
    const API_BASE = 'https://w9r4g7e58a.execute-api.ap-south-1.amazonaws.com/prod';
    
    let currentUser = null;
    let allEvents = [];
    let userRegistrations = new Set();
    let currentDate = new Date();
    let currentMonth = currentDate.getMonth();
    let currentYear = currentDate.getFullYear();

    try {
        currentUser = JSON.parse(localStorage.getItem('user') || 'null');
        console.log('Current user:', currentUser);
    } catch (e) {}

    // Load navbar
    fetch('navbar.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar').innerHTML = data;
            
            // Update navbar based on user login status
            if (currentUser) {
                const loginBtn = document.getElementById('loginNavBtn');
                const logoutBtn = document.getElementById('logoutBtn');
                
                if (loginBtn) loginBtn.style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'inline-block';
                
                // Add logout handler
                const logoutBtnElem = document.getElementById('logoutBtn');
                if (logoutBtnElem) {
                    logoutBtnElem.onclick = function() {
                        localStorage.removeItem('user');
                        window.location.href = 'login.html';
                    };
                }
            }
        })
        .catch(error => {
            console.error('Error loading navbar:', error);
        });

    // Toast notification system
    function showToast(message, type = 'info', duration = 4000) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        const icons = {
            success: '✅',
            error: '❌',
            warning: '⚠️',
            info: 'ℹ️'
        };
        
        const titles = {
            success: 'Success',
            error: 'Error',
            warning: 'Warning',
            info: 'Information'
        };
        
        toast.innerHTML = `
            <div class="toast-icon">${icons[type]}</div>
            <div class="toast-content">
                <div class="toast-title">${titles[type]}</div>
                <div class="toast-message">${message}</div>
            </div>
            <div class="toast-close" onclick="this.parentElement.remove()">✕</div>
        `;
        
        container.appendChild(toast);
        
        setTimeout(() => toast.classList.add('show'), 10);
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400);
        }, duration);
    }

    function loadUserRegistrations() {
        if (!currentUser) return;
        
        fetch(`${API_BASE}/my-events/${currentUser.id}`)
            .then(res => res.json())
            .then(events => {
                userRegistrations.clear();
                events.forEach(event => userRegistrations.add(event.id));
                console.log('User registrations:', Array.from(userRegistrations));
                
                if (document.getElementById('calendarView').style.display !== 'none') {
                    renderCalendar();
                } else {
                    renderListView();
                }
            })
            .catch(error => {
                console.error('Error loading user registrations:', error);
            });
    }

    function formatDate(dateString) {
        if (!dateString) return 'TBD';
        try {
            return new Date(dateString).toLocaleDateString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        } catch {
            return dateString;
        }
    }

    function formatTime(timeStr) {
        if (!timeStr) return '';
        try {
            const [h, m] = timeStr.split(':');
            const hour = parseInt(h);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const hour12 = hour % 12 || 12;
            return `${hour12}:${m} ${ampm}`;
        } catch {
            return timeStr;
        }
    }

    function formatDateForDisplay(dateStr) {
        const date = new Date(dateStr);
        return {
            month: date.toLocaleString('default', { month: 'long' }),
            day: date.getDate(),
            year: date.getFullYear(),
            full: date
        };
    }

    function escapeHtml(text) {
        if (!text) return text;
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function updateStats() {
        const totalEvents = document.getElementById('totalEvents');
        const upcomingEvents = document.getElementById('upcomingEvents');
        const thisMonth = document.getElementById('thisMonth');
        
        if (totalEvents) totalEvents.textContent = allEvents.length;
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const upcoming = allEvents.filter(e => new Date(e.event_date) >= today).length;
        if (upcomingEvents) upcomingEvents.textContent = upcoming;
        
        const thisMonthCount = allEvents.filter(e => {
            const date = new Date(e.event_date);
            return date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();
        }).length;
        if (thisMonth) thisMonth.textContent = thisMonthCount;
    }

    function renderCalendar() {
        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const startDay = firstDay.getDay();
        const daysInMonth = lastDay.getDate();

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
            'July', 'August', 'September', 'October', 'November', 'December'];
        document.getElementById('currentMonth').textContent = `${monthNames[currentMonth]} ${currentYear}`;

        let grid = '';
        const today = new Date();

        for (let i = 0; i < startDay; i++) {
            grid += `<div class="calendar-day other-month"></div>`;
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEvents = allEvents.filter(e => {
                const eventDate = e.event_date.split('T')[0];
                return eventDate === dateStr;
            });
            
            const isToday = today.getDate() === d && 
                           today.getMonth() === currentMonth && 
                           today.getFullYear() === currentYear;
            
            let eventsHtml = '';
            dayEvents.slice(0, 3).forEach(e => {
                eventsHtml += `<div class="mini-event" onclick="event.stopPropagation(); handleRegister(${e.id})" title="${e.title} - ${formatTime(e.event_time)}">📌 ${e.title.substring(0, 15)}${e.title.length > 15 ? '...' : ''}</div>`;
            });
            if (dayEvents.length > 3) {
                eventsHtml += `<div style="font-size:10px;color:var(--accent3);text-align:center;margin-top:4px;">+${dayEvents.length-3} more</div>`;
            }
            
            grid += `
                <div class="calendar-day ${isToday ? 'today' : ''}" onclick="openModalForDate('${dateStr}')">
                    <div class="day-number">${d}</div>
                    <div class="day-events">
                        ${eventsHtml || ''}
                    </div>
                </div>
            `;
        }

        const totalCells = Math.ceil((startDay + daysInMonth) / 7) * 7;
        const remainingCells = totalCells - (startDay + daysInMonth);
        for (let i = 0; i < remainingCells; i++) {
            grid += `<div class="calendar-day other-month"></div>`;
        }

        document.getElementById('calendarGrid').innerHTML = grid;
    }

    function renderListView() {
        const sorted = [...allEvents].sort((a, b) => a.event_date.localeCompare(b.event_date));
        const list = document.getElementById('listView');
        
        if (sorted.length === 0) {
            list.innerHTML = `
                <div class="no-events">
                    <i class="fas fa-calendar-times"></i>
                    <h3>No Events Scheduled</h3>
                    <p>Check back later for upcoming events</p>
                </div>
            `;
            return;
        }

        list.innerHTML = sorted.map((event, index) => {
            const date = formatDateForDisplay(event.event_date);
            const isRegistered = userRegistrations.has(event.id);
            
            return `
                <div class="schedule-item" style="animation-delay: ${index * 0.05}s">
                    <div class="schedule-date">
                        <div class="month">${date.month.substring(0, 3)}</div>
                        <div class="day">${date.day}</div>
                        <div class="year">${date.year}</div>
                    </div>
                    <div class="schedule-info">
                        <h3>${escapeHtml(event.title)}</h3>
                        <div class="meta">
                            <span><i class="fas fa-clock"></i> ${formatTime(event.event_time)}</span>
                            <span><i class="fas fa-map-pin"></i> ${escapeHtml(event.location) || 'TBD'}</span>
                        </div>
                        <div class="description">${escapeHtml(event.description) || 'No description available'}</div>
                    </div>
                    <button class="schedule-register ${isRegistered ? 'registered' : ''}" 
                            onclick="handleRegister(${event.id})" 
                            ${isRegistered ? 'disabled' : ''}>
                        ${isRegistered ? '<i class="fas fa-check-circle"></i> Registered' : '<i class="fas fa-ticket-alt"></i> Register'}
                    </button>
                </div>
            `;
        }).join('');
    }

    function loadEvents() {
        fetch(`${API_BASE}/events`)
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(events => {
                allEvents = events;
                updateStats();
                renderCalendar();
                renderListView();
                
                if (currentUser) {
                    loadUserRegistrations();
                }
            })
            .catch(error => {
                console.error('Error loading events:', error);
                document.getElementById('calendarGrid').innerHTML = `
                    <div class="no-events" style="grid-column:1/-1;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Failed to Load Events</h3>
                        <p>Please try again later</p>
                    </div>
                `;
            });
    }

    // Open modal for date
    window.openModalForDate = function(dateStr) {
        const eventsOnDate = allEvents.filter(e => {
            const eventDate = e.event_date.split('T')[0];
            return eventDate === dateStr;
        });
        
        const modal = document.getElementById('eventModal');
        const modalDate = document.getElementById('modalDate');
        const modalContent = document.getElementById('modalContent');
        
        const date = new Date(dateStr);
        const formattedDate = date.toLocaleDateString('en-US', { 
            weekday: 'long', 
            month: 'long', 
            day: 'numeric', 
            year: 'numeric' 
        });
        
        modalDate.innerHTML = `${formattedDate}`;
        
        if (eventsOnDate.length === 0) {
            modalContent.innerHTML = `
                <div class="modal-empty">
                    <i class="fas fa-calendar-times"></i>
                    <p>No events scheduled on this day</p>
                </div>
            `;
        } else {
            modalContent.innerHTML = eventsOnDate.map(event => {
                const isRegistered = userRegistrations.has(event.id);
                const eventTime = formatTime(event.event_time);
                
                return `
                    <div class="modal-event-item">
                        <div class="modal-event-title">
                            <i class="fas fa-calendar-alt"></i> ${escapeHtml(event.title)}
                        </div>
                        <div class="modal-event-details">
                            <div class="modal-event-detail">
                                <i class="fas fa-clock"></i> ${eventTime}
                            </div>
                            <div class="modal-event-detail">
                                <i class="fas fa-map-pin"></i> ${escapeHtml(event.location) || 'TBD'}
                            </div>
                        </div>
                        <div class="modal-event-desc">
                            ${escapeHtml(event.description) || 'No description available.'}
                        </div>
                        <div class="modal-event-actions">
                            <button class="modal-btn-register ${isRegistered ? 'registered' : ''}" 
                                    onclick="registerFromModal(${event.id})" 
                                    ${isRegistered ? 'disabled' : ''}>
                                ${isRegistered ? '<i class="fas fa-check-circle"></i> Registered' : '<i class="fas fa-ticket-alt"></i> Register Now'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        modal.classList.add('active');
    };

    // Register from modal with toast
    window.registerFromModal = function(eventId) {
        if (!currentUser) {
            closeModal();
            showToast('Please login first', 'warning');
            setTimeout(() => window.location.href = 'login.html', 1500);
            return;
        }
        
        const event = allEvents.find(e => e.id === eventId);
        const eventTitle = event ? event.title : 'Event';
        
        fetch(`${API_BASE}/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                user_id: currentUser.id, 
                event_id: eventId 
            })
        })
        .then(res => {
            if (!res.ok) {
                return res.json().then(err => { throw new Error(err.message); });
            }
            return res.json();
        })
        .then(data => {
            if (data.message === 'Already registered for this event') {
                showToast(`You're already registered for ${eventTitle}`, 'info');
            } else {
                showToast(`Successfully registered for ${eventTitle}!`, 'success');
                userRegistrations.add(eventId);
                // Refresh modal content
                const dateStr = new Date(event.event_date).toISOString().split('T')[0];
                openModalForDate(dateStr);
                // Refresh calendar and list
                if (document.getElementById('calendarView').style.display !== 'none') {
                    renderCalendar();
                } else {
                    renderListView();
                }
            }
        })
        .catch(err => {
            console.error('Register error:', err);
            showToast('Registration failed. Please try again.', 'error');
        });
    };

    window.closeModal = function() {
        document.getElementById('eventModal').classList.remove('active');
    };

    // Close modal on ESC key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeModal();
        }
    });

    // Close modal when clicking overlay
    document.getElementById('eventModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    // Handle register from mini-events with toast
    window.handleRegister = function(eventId) {
        if (!currentUser) {
            showToast('Please login first', 'warning');
            setTimeout(() => window.location.href = 'login.html', 1500);
            return;
        }
        
        const event = allEvents.find(e => e.id === eventId);
        const eventTitle = event ? event.title : 'Event';
        
        fetch(`${API_BASE}/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                user_id: currentUser.id, 
                event_id: eventId 
            })
        })
        .then(res => {
            if (!res.ok) {
                return res.json().then(err => { throw new Error(err.message); });
            }
            return res.json();
        })
        .then(data => {
            if (data.message === 'Already registered for this event') {
                showToast(`You're already registered for ${eventTitle}`, 'info');
            } else {
                showToast(`Successfully registered for ${eventTitle}!`, 'success');
                userRegistrations.add(eventId);
                if (document.getElementById('calendarView').style.display !== 'none') {
                    renderCalendar();
                } else {
                    renderListView();
                }
            }
        })
        .catch(err => {
            console.error('Register error:', err);
            showToast('Registration failed. Please try again.', 'error');
        });
    };

    window.changeMonth = function(delta) {
        currentMonth += delta;
        if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
        } else if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
        }
        renderCalendar();
    };

    window.switchView = function(view) {
        const btnCalendar = document.getElementById('btnCalendar');
        const btnList = document.getElementById('btnList');
        const calendarView = document.getElementById('calendarView');
        const listView = document.getElementById('listView');
        
        if (view === 'calendar') {
            btnCalendar.classList.add('active');
            btnList.classList.remove('active');
            calendarView.style.display = 'block';
            listView.style.display = 'none';
            renderCalendar();
        } else {
            btnList.classList.add('active');
            btnCalendar.classList.remove('active');
            calendarView.style.display = 'none';
            listView.style.display = 'flex';
            renderListView();
        }
    };

    document.addEventListener('DOMContentLoaded', function() {
        loadEvents();
        switchView('calendar');
    });
    </script>
</body>
</html>
