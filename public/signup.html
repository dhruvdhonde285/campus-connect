<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Campus+Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07);
            --accent: #ff4d6d;
            --accent2: #7c3aed;
            --accent3: #06b6d4;
            --gold: #f59e0b;
            --text: #f0f0f8;
            --muted: #6b7280;
            --green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: pageFadeIn 0.8s ease-out;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80vw 60vh at 10% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60vw 50vh at 90% 80%, rgba(255,77,109,0.1) 0%, transparent 55%),
                radial-gradient(ellipse 50vw 40vh at 50% 50%, rgba(6,182,212,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .signup-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            margin: 20px;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px 32px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .signup-card:hover {
            transform: translateY(-5px);
            border-color: rgba(6,182,212,0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo .campus {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo .plus {
            color: var(--accent3);
        }

        .logo .connect {
            background: linear-gradient(135deg, var(--accent3), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--muted);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        input, select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px 14px 48px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent3);
            box-shadow: 0 0 0 4px rgba(6,182,212,0.1);
            transform: translateY(-2px);
        }

        input:focus + .input-icon, select:focus + .input-icon {
            color: var(--accent3);
        }

        .signup-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent3), var(--green));
            color: #0a0a0f;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .signup-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(6,182,212,0.4);
        }

        .login-link {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .login-link a {
            color: var(--accent3);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: var(--accent);
        }

        .error-message {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .success-message {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            color: var(--green);
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .success-message.show {
            display: flex;
        }

        .role-selector {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .role-option {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-option:hover {
            border-color: var(--accent3);
            transform: translateY(-2px);
        }

        .role-option.selected {
            border-color: var(--accent3);
            background: rgba(6,182,212,0.1);
        }

        .role-option i {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
        }

        .role-option .role-name {
            font-size: 14px;
            font-weight: 600;
        }

        .role-option .role-desc {
            font-size: 11px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="logo">
                <h1>
                    <span class="campus">Campus 
                        Connect
                    </span>
                </h1>
            </div>

            <h2>Create Account</h2>
            <p class="subtitle">Join the campus community</p>

            <div class="input-group">
                <label class="input-label">Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="name" placeholder="John Doe">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="student@campus.edu">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Create a strong password">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-circle input-icon"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password">
                </div>
            </div>

       
            <button class="signup-btn" onclick="signup()">
                <i class="fas fa-user-plus"></i>
                Create Account
            </button>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText"></span>
            </div>

            <div class="login-link">
                Already have an account?
                <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script>
    const API_BASE = 'https://w9r4g7e58a.execute-api.ap-south-1.amazonaws.com/prod';

    function selectRole(role) {
        const studentRole = document.getElementById('studentRole');
        const adminRole = document.getElementById('adminRole');
        const roleInput = document.getElementById('role');
        
        if (role === 'student') {
            studentRole.classList.add('selected');
            adminRole.classList.remove('selected');
            roleInput.value = 'student';
        } else {
            adminRole.classList.add('selected');
            studentRole.classList.remove('selected');
            roleInput.value = 'admin';
        }
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = message;
        errorDiv.classList.add('show');
        
        const successDiv = document.getElementById('successMessage');
        successDiv.classList.remove('show');
        
        setTimeout(() => errorDiv.classList.remove('show'), 4000);
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        successText.textContent = message;
        successDiv.classList.add('show');
        
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.classList.remove('show');
    }

    function signup() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const role = document.getElementById('role').value;

        // Validation
        if (!name || !email || !password) {
            showError('Please fill in all fields');
            return;
        }

        if (password !== confirmPassword) {
            showError('Passwords do not match');
            return;
        }

        if (password.length < 6) {
            showError('Password must be at least 6 characters');
            return;
        }

        if (!email.includes('@')) {
            showError('Please enter a valid email address');
            return;
        }

        const btn = document.querySelector('.signup-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
        btn.disabled = true;

        fetch(`${API_BASE}/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password, role })
        })
        .then(res => res.json())
        .then(data => {
            if (data.message === 'User created successfully') {
                showSuccess('Account created successfully! Redirecting to login...');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else if (data.message === 'Email already exists') {
                showError('Email already registered. Please login instead.');
            } else {
                showError(data.message || 'Signup failed. Please try again.');
            }
        })
        .catch(err => {
            console.error('Signup error:', err);
            showError('Connection error. Please try again.');
        })
        .finally(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    }

    // Add Enter key support
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            signup();
        }
    });
    </script>
</body>
</html>
